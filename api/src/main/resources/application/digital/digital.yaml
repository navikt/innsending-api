post:
  summary: Submit application
  operationId: submitDigitalApplication
  security:
  - idporten: []

  parameters:
    - $ref: "../../common/components.yaml#/components/parameters/InnsendingsId"
    - $ref: "../../common/components.yaml#/components/parameters/EnvQualifier"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../common.yaml#/components/schemas/SubmitApplicationRequest"

  responses:
    201:
      $ref: "../common.yaml#/components/responses/ApplicationSubmissionSuccess"
    401:
      $ref: "../../common/components.yaml#/components/responses/AuthError"
    403:
      $ref: "../../common/components.yaml#/components/responses/AuthError"
    500:
      $ref: "../../common/components.yaml#/components/responses/InteralServerError"
  tags:
    - fyllut

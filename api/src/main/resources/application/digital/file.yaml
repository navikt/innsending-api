get:
  summary: Get file
  operationId: getAttachmentFile
  security:
  - idporten: []

  parameters:
    - $ref: "../../common/components.yaml#/components/parameters/InnsendingsId"
    - $ref: "../../common/components.yaml#/components/parameters/AttachmentId"
    - $ref: "../../common/components.yaml#/components/parameters/FileId"

  responses:
    200:
      description: OK
      content:
        application/octet-stream:
          schema:
            $ref: "../common.yaml#/components/schemas/FileContent"
    500:
      $ref: "../../common/components.yaml#/components/responses/InteralServerError"
  tags:
    - sendinn-fil

delete:
  summary: Delete file
  operationId: deleteAttachmentFile
  security:
  - idporten: []

  parameters:
    - $ref: "../../common/components.yaml#/components/parameters/InnsendingsId"
    - $ref: "../../common/components.yaml#/components/parameters/AttachmentId"
    - $ref: "../../common/components.yaml#/components/parameters/FileId"

  responses:
    204:
      description: No Content
    500:
      $ref: "../../common/components.yaml#/components/responses/InteralServerError"
  tags:
    - sendinn-fil
